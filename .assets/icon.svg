<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D1A"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00F5FF"/>
      <stop offset="100%" style="stop-color:#0066FF"/>
    </linearGradient>
    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF00FF"/>
      <stop offset="100%" style="stop-color:#FF6B00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="60" fill="url(#bgGrad)"/>
  
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#cyanGrad)" stroke-width="4" opacity="0.5" filter="url(#glow)"/>
  
  <!-- Inner rings -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#00F5FF" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#FF00FF" stroke-width="2" opacity="0.4"/>
  
  <!-- N shape - Main -->
  <path d="M 180 340 L 180 180 L 256 280 L 332 180 L 332 340" 
        fill="none" 
        stroke="url(#cyanGrad)" 
        stroke-width="32" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
  
  <!-- Lightning bolt accent -->
  <path d="M 390 120 L 420 180 L 400 180 L 430 260 L 380 200 L 400 200 L 370 120 Z" 
        fill="#FFD700"
        filter="url(#glow)"/>
  
  <!-- Corner accents -->
  <path d="M 80 80 L 120 80 L 80 120 Z" fill="#00F5FF" opacity="0.6"/>
  <path d="M 432 80 L 432 120 L 392 80 Z" fill="#FF00FF" opacity="0.6"/>
  <path d="M 80 432 L 80 392 L 120 432 Z" fill="#FF00FF" opacity="0.6"/>
  <path d="M 432 432 L 392 432 L 432 392 Z" fill="#00F5FF" opacity="0.6"/>
  
  <!-- Scan lines effect -->
  <g opacity="0.1">
    <line x1="60" y1="150" x2="452" y2="150" stroke="#00F5FF" stroke-width="1"/>
    <line x1="60" y1="256" x2="452" y2="256" stroke="#00F5FF" stroke-width="1"/>
    <line x1="60" y1="362" x2="452" y2="362" stroke="#00F5FF" stroke-width="1"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="430" text-anchor="middle" fill="#FFFFFF" font-family="Arial Black, sans-serif" font-size="32" font-weight="bold" letter-spacing="8">NIU CAST</text>
  
  <!-- Gaming edition subtitle -->
  <text x="256" y="460" text-anchor="middle" fill="#00F5FF" font-family="Arial, sans-serif" font-size="14" opacity="0.8">GAMING EDITION</text>
</svg>